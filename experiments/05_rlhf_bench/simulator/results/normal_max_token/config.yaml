backend:
  type: tinker
  base_url: "http://localhost:10610"
  api_key: "tml-dev-key"
  base_model: "Qwen/Qwen3-4B-Instruct-2507"

tenants:
  # ── Math Reasoning ──────────────────────────────────────
  - id: "gsm8k-A"
    task: gsm8k
    request_rate: 1.0        # Per-User: single user agent
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 768           # step-by-step CoT reasoning
    temperature: 0.7

  - id: "gsm8k-shared"
    task: gsm8k
    request_rate: 10.0        # Per-Base-Model: ~10 concurrent users
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 768
    temperature: 0.7

  - id: "countdown-A"
    task: countdown
    request_rate: 1.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 256           # short expression output
    temperature: 0.9

  - id: "countdown-shared"
    task: countdown
    request_rate: 10.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 256
    temperature: 0.9

  - id: "math-A"
    task: math
    request_rate: 1.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 1024          # competition-level proofs
    temperature: 0.7

  - id: "math-shared"
    task: math
    request_rate: 10.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 1024
    temperature: 0.7

  # ── Code Generation ────────────────────────────────────
  - id: "mbpp-A"
    task: mbpp
    request_rate: 1.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 512           # function-level code
    temperature: 0.7

  - id: "mbpp-shared"
    task: mbpp
    request_rate: 10.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 512
    temperature: 0.7

  - id: "humaneval-A"
    task: humaneval
    request_rate: 1.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 512
    temperature: 0.7

  - id: "humaneval-shared"
    task: humaneval
    request_rate: 10.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 512
    temperature: 0.7

  # ── Instruction Following ──────────────────────────────
  - id: "ifeval-A"
    task: ifeval
    request_rate: 1.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 1024          # format-heavy, may need long output
    temperature: 0.7

  - id: "ifeval-shared"
    task: ifeval
    request_rate: 10.0
    buffer_size: 64
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 1024
    temperature: 0.7

evaluation:
  # eval_interval_steps 应小于 num_train_steps 才会触发定期 eval
  # 最后一步始终会做一次 final eval
  eval_interval_steps: 5
  eval_sample_size: 200
  eval_temperature: 0.1

output_path: "results.json"
seed: 42
