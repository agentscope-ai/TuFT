backend:
  type: tinker
  base_url: "http://localhost:10610"
  api_key:
  base_model: "Qwen/Qwen3-4B"

tenants:
  # ── Math Reasoning ──────────────────────────────────────
  - id: "gsm8k-A"
    task: gsm8k
    request_rate: 1.0        # Per-User: single user agent
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 768           # step-by-step CoT reasoning
    temperature: 0.7
    sync_mode: true           # 采样与训练串行；该 tenant 所有 batch 的 staleness == 0

  - id: "gsm8k-shared"
    task: gsm8k
    request_rate: 10.0        # Per-Base-Model: ~10 concurrent users
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 768
    temperature: 0.7
    sync_mode: true

  - id: "countdown-A"
    task: countdown
    request_rate: 1.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 256           # short expression output
    temperature: 0.9
    sync_mode: true

  - id: "countdown-shared"
    task: countdown
    request_rate: 10.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 256
    temperature: 0.9
    sync_mode: true

  - id: "math-A"
    task: math
    request_rate: 1.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 1024          # competition-level proofs
    temperature: 0.7
    sync_mode: true

  - id: "math-shared"
    task: math
    request_rate: 10.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 1024
    temperature: 0.7
    sync_mode: true

  # ── Code Generation ────────────────────────────────────
  - id: "mbpp-A"
    task: mbpp
    request_rate: 1.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 512           # function-level code
    temperature: 0.7
    sync_mode: true

  - id: "mbpp-shared"
    task: mbpp
    request_rate: 10.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 512
    temperature: 0.7
    sync_mode: true

  - id: "humaneval-A"
    task: humaneval
    request_rate: 1.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 512
    temperature: 0.7
    sync_mode: true

  - id: "humaneval-shared"
    task: humaneval
    request_rate: 10.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 512
    temperature: 0.7
    sync_mode: true

  # ── Instruction Following ──────────────────────────────
  - id: "ifeval-A"
    task: ifeval
    request_rate: 1.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 1024          # format-heavy, may need long output
    temperature: 0.7
    sync_mode: true

  - id: "ifeval-shared"
    task: ifeval
    request_rate: 10.0
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 1024
    temperature: 0.7
    sync_mode: true

  # ── Agent RL (Multi-Turn) ─────────────────────────────────
  - id: "hotpotqa-A"
    task: hotpotqa
    request_rate: 1.0         # Per-User: single agent user
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 512           # per-turn generation length
    temperature: 0.7
    sync_mode: true
    max_turns: 8              # max turns per episode

  - id: "hotpotqa-shared"
    task: hotpotqa
    request_rate: 5.0         # Per-Base-Model: ~5 concurrent agent users
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 512
    temperature: 0.7
    sync_mode: true
    max_turns: 8

  - id: "math-agent-A"
    task: math_agent
    request_rate: 1.0         # Per-User: single agent
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 256           # short per-step output (Thought + Action)
    temperature: 0.7
    sync_mode: true
    max_turns: 6              # GSM8K typically needs 3-5 calculation steps

  - id: "math-agent-shared"
    task: math_agent
    request_rate: 5.0         # Per-Base-Model: ~5 concurrent agent users
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 256
    temperature: 0.7
    sync_mode: true
    max_turns: 6

  - id: "triviaqa-A"
    task: triviaqa
    request_rate: 1.0         # Per-User: single agent
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 256           # short per-step (Thought + Search/Finish)
    temperature: 0.7
    sync_mode: true
    max_turns: 5              # typically 1-3 searches then finish

  - id: "triviaqa-shared"
    task: triviaqa
    request_rate: 5.0         # Per-Base-Model: ~5 concurrent agent users
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 256
    temperature: 0.7
    sync_mode: true
    max_turns: 5

  - id: "apibank-A"
    task: apibank
    request_rate: 1.0         # Per-User: single agent
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 256           # per-step: Thought + ToolCall/Finish
    temperature: 0.7
    sync_mode: true
    max_turns: 6              # most tasks need 1-3 API calls

  - id: "apibank-shared"
    task: apibank
    request_rate: 5.0         # Per-Base-Model: ~5 concurrent agent users
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 256
    temperature: 0.7
    sync_mode: true
    max_turns: 6

  - id: "toolbench-A"
    task: toolbench
    request_rate: 1.0         # Per-User: single agent
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 8
    learning_rate: 1e-4
    max_tokens: 256           # per-step: Thought + CallAPI/Finish
    temperature: 0.7
    sync_mode: true
    max_turns: 6              # multi-step API chains (2-3 calls typical)

  - id: "toolbench-shared"
    task: toolbench
    request_rate: 5.0         # Per-Base-Model: ~5 concurrent agent users
    buffer_size: 128
    num_train_steps: 50
    lora_rank: 16
    learning_rate: 1e-4
    max_tokens: 256
    temperature: 0.7
    sync_mode: true
    max_turns: 6

evaluation:
  # eval_interval_steps 应小于 num_train_steps 才会触发定期 eval
  # 最后一步始终会做一次 final eval
  eval_interval_steps: 5
  eval_sample_size: 200
  eval_temperature: 0.1

# Sampling vs Training logprob mismatch collection.
# enabled=true 时，每个 train step 前会用 forward(cross_entropy) 在当前训练权重
# 上抓 response token 的 logprob，与采样时记录的 sampling_logprobs 配对，
# 写入 results.json 的 per_tenant.<id>.logprob_mismatch_per_step。
# dump_per_token=true 时，会把每条样本的 per-token (sampling_lp, training_lp)
# 数据写入 <output_path 同名>.logprobs.jsonl，便于事后做可预测性分析。
logprob_collection:
  enabled: true
  dump_per_token: true
  output_path: "logprobs/tp2_fsdp1_id0_sync_quant.jsonl"  # 可选，缺省自动派生

output_path: "results.json"
seed: 42
