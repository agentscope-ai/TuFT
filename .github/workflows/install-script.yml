name: Install Script

on:
  push:
    branches: [main, dev/**, feature/**]
    paths:
      - 'scripts/install.sh'
      - '.github/workflows/install-script.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/install.sh'
      - '.github/workflows/install-script.yml'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  test-install-script:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    # Backstop so a blocking step (e.g. `tuft launch`) can't hang for the
    # default 6h job timeout. Normal runs finish in ~3-4 min.
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test install script syntax
        run: bash -n scripts/install.sh

      - name: Test install script help
        run: bash scripts/install.sh --help

      - name: Run install script (local source)
        run: |
          bash scripts/install.sh --local-source "$GITHUB_WORKSPACE"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Verify tuft command exists
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          which tuft
          tuft --help
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Verify tuft version
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft version
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Verify Python environment
        run: |
          test -f "${TUFT_HOME}/venv/bin/python"
          "${TUFT_HOME}/venv/bin/python" -c "import tuft; print('tuft imported successfully')"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test tuft launch --help
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft launch --help
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test tuft launch requires config
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          # Should fail with config error when no config provided
          if tuft launch 2>&1; then
            echo "Expected tuft launch to fail without config"
            exit 1
          fi
          # Verify error message mentions config
          tuft launch 2>&1 | grep -qi "config"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test tuft launch with config file
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          # Create a minimal config file
          cat > "${TUFT_HOME}/configs/tuft_config.yaml" << 'EOF'
          model_owner: test
          supported_models:
            - model_name: test-model
              model_path: /nonexistent/path
              max_model_len: 1024
          authorized_users:
            test-key: test-user
          EOF
          # `tuft launch` is a blocking uvicorn server: with a valid config it
          # passes validation and serves (models load lazily, so a bad
          # model_path does NOT make it exit). Run it in the background and stop
          # it after it has had time to start, so CI can't hang on the server.
          # Portable (no `timeout`, which isn't on macOS): we just smoke-test
          # that launch accepts the config and starts up.
          tuft launch > launch.log 2>&1 &
          launch_pid=$!
          sleep 60
          if kill -0 "$launch_pid" 2>/dev/null; then
            echo "OK: tuft launch is still serving after startup (config validation passed)"
          else
            echo "tuft launch exited on its own within 60s; output:"
            cat launch.log
          fi
          # Stop the server and its children. SIGKILL is uncatchable, and we
          # deliberately do NOT `wait` (the server ignores SIGTERM), so this
          # never blocks the job.
          pkill -KILL -P "$launch_pid" 2>/dev/null || true
          kill -KILL "$launch_pid" 2>/dev/null || true
          # Fail only if launch never accepted the provided config file.
          if grep -q "Configuration file must be provided" launch.log; then
            echo "FAIL: tuft launch did not pick up the provided config"
            exit 1
          fi
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Clean up installation
        run: rm -rf "${TUFT_HOME}"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

  test-backend-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run install script
        run: |
          bash scripts/install.sh --local-source "$GITHUB_WORKSPACE"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Verify backend dependencies installed
        run: |
          "${TUFT_HOME}/venv/bin/python" -c "import peft; print('peft imported successfully')"
          "${TUFT_HOME}/venv/bin/python" -c "import redis; print('redis imported successfully')"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Clean up installation
        run: rm -rf "${TUFT_HOME}"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

  test-wrapper-commands:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tuft
        run: bash scripts/install.sh --local-source "$GITHUB_WORKSPACE"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test help command
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft help
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test version command
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft version
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test upgrade command (from PyPI)
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft upgrade
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test upgrade command (from local source)
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft upgrade --local-source "$GITHUB_WORKSPACE"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Clean up installation
        run: rm -rf "${TUFT_HOME}"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

  test-clean-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initial install
        run: |
          bash scripts/install.sh --local-source "$GITHUB_WORKSPACE"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Create marker file to verify clean
        run: |
          echo "marker" > "${TUFT_HOME}/marker.txt"
          test -f "${TUFT_HOME}/marker.txt"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Reinstall with --clean
        run: |
          bash scripts/install.sh --local-source "$GITHUB_WORKSPACE" --clean
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Verify marker file was removed
        run: |
          # Marker file should be gone after --clean
          test ! -f "${TUFT_HOME}/marker.txt"
          # But tuft should still be installed
          "${TUFT_HOME}/venv/bin/python" -c "import tuft; print('tuft imported successfully')"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Clean up installation
        run: rm -rf "${TUFT_HOME}"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

  test-upgrade-from-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tuft
        run: bash scripts/install.sh --local-source "$GITHUB_WORKSPACE"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Test upgrade --from-source
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft upgrade --from-source
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Verify tuft still works after upgrade
        run: |
          export PATH="${TUFT_HOME}/bin:$PATH"
          tuft version
          tuft launch --help
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft

      - name: Clean up installation
        run: rm -rf "${TUFT_HOME}"
        env:
          TUFT_HOME: ${{ runner.temp }}/tuft
